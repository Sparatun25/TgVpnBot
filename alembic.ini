# Alembic configuration for OnyxVpn.
#
# Documentation in migrations/README.md (workflow, commands, troubleshooting).
# This file must stay ASCII-only: Alembic reads it with the OS locale encoding
# (cp1251 on Windows), and Cyrillic comments would break the parser.

[alembic]
script_location = migrations
prepend_sys_path = .

# Revision file template: YYYY-MM-DD_HHMM-<rev>_<slug>
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for revision dates. All DateTime columns in models are tz-aware (UTC).
timezone = UTC

truncate_slug_length = 40

# sqlalchemy.url is intentionally empty here.
# env.py overrides it with settings.database_url (from core.config) so the
# migration uses the SAME connection string as the running app.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
